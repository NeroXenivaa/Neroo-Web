<html>

<head>
    <title>Login-SignUP / Web</title>
    <link rel="icon" href="./content/./Neroo-Web-Icon.jpg">
    <link rel="stylesheet" href="./Login-signup.css">
</head>

<body>
    <!-- navbar start -->
    <div class="navbar-container">
        <div class="navbar-content">
            <!-- navbar content -->
            <div class="img-container">
                <a href="./Neroo.html"><img src="./content/house-regular.png"></a>
            </div>

            <!-- navbar list -->
            <div class="list-container">
                <ul class="ul-container">
                    <li class="li-container"><a href="./Neroo.html">Home</a></li>
                </ul>
            </div>
        </div>
    </div>
    <!-- navbar end -->

    <!-- Login & Sign-Up container start-->
    <div class="login-signup-container">
        <!-- login container -->
        <div class="login-container">
            <form>
                <!-- title -->
                <div class="h1-login-container">
                    <h1>Sign In</h1>
                </div>
                <!-- icon-sosial -->
                <div class="sosial-icon-container">
                    <a href="#" class="icon"><img src="./content/./google-plus-g-brands-solid.png"></a>
                    <a href="#" class="icon"><img src="./content/./github-brands-solid.png"></a>
                    <a href="#" class="icon"><img src="./content/facebook-brands-solid.png"></a>
                    <a href="#" class="icon"><img src="./content/twitter-brands-solid.png"></a>
                </div>
                <span>Or use your email password</span>
                <!-- input username -->
                <div>
                    <input type="email" placeholder="Email">
                    <input type="password" placeholder="Password">
                </div>
                <a href="#">Forgot your Password?</a>
                <!-- button -->
                <button type="submit">Sign in</button>
            </form>
        </div>

        <!-- sign-up container -->
        <div>
            <form>
                <!-- title -->
                <div>
                    <h1>Sign up</h1>
                </div>
                <!-- icon-sosial -->
                <div>
                    <a href="#"><img src="./content/./google-plus-g-brands-solid.png"></a>
                    <a href="#"><img src="./content/./github-brands-solid.png"></a>
                    <a href="#"><img src="./content/facebook-brands-solid.png"></a>
                    <a href="#"><img src="./content/twitter-brands-solid.png"></a>
                </div>
                <span>Or use your email for registeration</span>
                <!-- input username -->
                <div>
                    <input type="text" placeholder="Name">
                    <input type="email" placeholder="Email">
                    <input type="password" placeholder="Password">
                </div>
                <input type="checkbox"><span>Remember me</span>
                <!-- button -->
                <button type="submit">Sign up</button>
            </form>
        </div>
        <!-- toogle login -->
        <div>
            <div>
                <div>
                    <h1>Welcome back!</h1>
                    <p>Login to use feature of the web, and learn universe of the web</p>
                    <button id="Login">Sign up</button>
                </div>
            </div>
        </div>

        <!-- toogle sign up -->
        <div>
            <div>
                <div>
                    <h1>Hello, Friend!</h1>
                    <p>Register to your account and create the universe of the web</p>
                    <button id="sign-up">Sign in</button>
                </div>
            </div>
        </div>
    </div>
    <!-- Login & Sign-Up container end-->
</body>

</html>
