<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craft · quantum matrix</title>
    <style>
        *,
        html {
            padding: 0;
            margin: 0;
            font-family: 'Segoe UI', 'sans-serif';
            box-sizing: border-box;
            list-style: none;
        }

        body {
            height: 100vh;
            background: #0b0f16; /* deep base */
        }

        img {
            width: 120px;
            height: 120px;
            display: block;
            pointer-events: none; /* biar klik langsung ke cube */
            user-select: none;
        }

        /* ===== PAGE 3 =====  dengan background industrial/grunge seperti template */
        #Neroo-page-3 {
            height: 100vh;
            overflow: hidden;
            position: relative;
            background: #1a1e2b; /* fallback */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(100, 150, 200, 0.15) 0%, transparent 30%),
                radial-gradient(circle at 90% 70%, rgba(200, 120, 50, 0.12) 0%, transparent 40%),
                repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.02) 0px, rgba(255, 255, 255, 0.02) 2px, transparent 2px, transparent 8px),
                linear-gradient(145deg, #141a24 0%, #1f2837 100%);
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.7);
        }

        /* tekstur coret / garis tipis ala template */
        #Neroo-page-3::after {
            content: "";
            position: absolute;
            inset: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path d="M10 10 L 90 10 M10 30 L 90 30 M10 50 L 90 50 M10 70 L 90 70 M10 90 L 90 90" stroke="%23ffffff" stroke-width="0.3" opacity="0.08" /></svg>');
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        /* ========== CONTENT CRAFT ========== */
        .content-craft-base {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 5;
        }

        /* ========== BUTTON CRAFT — premium glow + magnetic border ========= */
        .craft-button-base {
            margin-bottom: 40px;
            position: relative;
            border-radius: 60px;
            background: rgba(10, 15, 25, 0.5);
            padding: 3px;
            backdrop-filter: blur(2px);
            transition: 0.2s;
        }

        .craft-button-base button {
            position: relative;
            background: #1e2636;
            border: none;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 6px;
            padding: 18px 70px;
            border-radius: 60px;
            color: #e0e5f0;
            text-transform: uppercase;
            cursor: pointer;
            z-index: 2;
            transition: all 0.25s ease;
            box-shadow: 0 0 10px rgba(0, 200, 255, 0.2), inset 0 0 10px rgba(255,255,255,0.1);
            border: 1px solid rgba(120, 180, 255, 0.3);
            text-shadow: 0 0 5px cyan;
        }

        /* efek border gradien yang mengikuti cursor (magnetic border glow) */
        .craft-button-base::before {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(80, 220, 255, 0.9), rgba(150, 80, 255, 0.6), transparent 70%);
            border-radius: 64px;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.3s;
            mix-blend-mode: screen;
            pointer-events: none;
        }

        .craft-button-base:hover::before {
            opacity: 1;
        }

        .craft-button-base button:hover {
            background: #222f42;
            color: white;
            box-shadow: 0 0 30px #00d0ff, 0 0 60px #3a6ea5;
            border-color: #6ec8ff;
            transform: scale(1.02);
            text-shadow: 0 0 10px white, 0 0 20px cyan;
        }

        .craft-button-base button:active {
            transform: scale(0.98);
        }

        /* base box — mirip template dengan garis line1 */
        .content-craft-base-box {
            background: #2c3547; /* solid seperti template, tapi kita blend dengan texture */
            padding: 30px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            border-radius: 50px;
            border: 2px solid rgba(120, 150, 220, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(0, 255, 255, 0.2);
            position: relative;
            backdrop-filter: blur(2px);
            background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.2) 0px, rgba(0,0,0,0.2) 2px, transparent 2px, transparent 10px);
        }

        .content-craft-div-box {
            display: flex;
            flex-direction: column;
            gap: 70px;
        }

        .craft-box {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: transparent; /* biar kayak template, tanpa background box solid */
        }

        .craft-box h1 {
            position: absolute;
            bottom: -32px;  /* turun sedikit agar di bawah cube */
            font-size: 26px;
            font-weight: 600;
            color: rgba(220, 240, 255, 0.9);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00c8ff, 0 2px 4px black;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 14px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
            white-space: nowrap;
        }

        /* cube styling */
        .cube {
            transition: transform 0.3s cubic-bezier(0.2, 1, 0.3, 1), filter 0.2s, box-shadow 0.3s;
            cursor: pointer;
            border-radius: 20px;
            background: rgba(10, 20, 30, 0.6);
            padding: 10px;
            backdrop-filter: blur(6px);
            border: 2px solid rgba(140, 210, 255, 0.6);
            box-shadow: 0 0 20px rgba(0, 180, 255, 0.4);
        }

        .cube img {
            transition: filter 0.2s;
        }

        .cube:hover {
            transform: scale(1.12);
            border-color: #aaffff;
            box-shadow: 0 0 40px cyan, 0 0 80px #2a6f9c;
        }

        .cube.ACC {
            filter: invert(1) drop-shadow(0 0 12px white);
            transform: scale(1.3);
            border-color: white;
            box-shadow: 0 0 50px #fff8, 0 0 90px #9cdbff;
            background: rgba(255, 255, 255, 0.2);
        }

        .cube.ACC img {
            filter: invert(1); /* gambar jadi putih terang */
        }

        /* garis line1 di dalam base (seperti di template) */
        .line {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            height: 4px;
            width: 80%;
            bottom: 20px;
            left: 10%;
            border-radius: 4px;
            box-shadow: 0 0 20px cyan;
        }

        /* tambahan senter pattern */
        .content-craft-base-box::after {
            content: "";
            position: absolute;
            top: 10px; left: 20px;
            width: 150px; height: 150px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* responsive sentuhan */
        @media (max-width: 700px) {
            .content-craft-base-box { gap: 15px; padding: 20px; }
            .cube img { width: 90px; height: 90px; }
        }
    </style>
</head>
<body>

<section id="Neroo-page-3" class="page3 fade">
    <div class="content-craft-base">

        <!-- BUTTON CRAFT dengan efek glow + border magnet -->
        <div class="craft-button-base" id="glowButtonBase">
            <button id="craftMainBtn">Craft</button>
        </div>

        <!-- base box (template layout) -->
        <div class="content-craft-base-box" id="mainCraftBox">

            <!-- kiri (atas/bawah) -->
            <div class="content-craft-div-box">
                <div class="craft-box">
                    <h1>Quantum</h1>
                    <div class="cube" data-name="quantum" onclick="setFunction(this)">
                        <img src="./content/./icon/./Cube-icon.png" alt="cube">
                    </div>
                </div>
                <div class="craft-box">
                    <h1>People</h1>
                    <div class="cube" data-name="people" onclick="setFunction(this)">
                        <img src="./content/./icon/./Cube-icon.png" alt="cube">
                    </div>
                </div>
            </div>

            <!-- tengah (center) -->
            <div class="craft-box">
                <h1>Center</h1>
                <div class="cube ACC" data-name="center" onclick="setFunction(this)" id="centerCube">
                    <img src="./content/./icon/./Cube-icon.png" alt="cube">
                </div>
            </div>

            <!-- kanan (xilonen & mini) -->
            <div class="content-craft-div-box">
                <div class="craft-box">
                    <h1>Xilonen</h1>
                    <div class="cube" data-name="xilonen" onclick="setFunction(this)">
                        <img src="./content/./icon/./Cube-icon.png" alt="cube">
                    </div>
                </div>
                <div class="craft-box">
                    <h1>Mini</h1>
                    <div class="cube" data-name="mini" onclick="setFunction(this)">
                        <img src="./content/./icon/./Cube-icon.png" alt="cube">
                    </div>
                </div>
            </div>
            <div class="line" id="line1"></div>
        </div>
    </div>
</section>

<!-- JavaScript interaktif: invert toggle, craft button pattern & background changer -->
<script>
    (function() {
        // Ambil semua cube
        const cubes = document.querySelectorAll('.cube');
        const craftBtn = document.getElementById('craftMainBtn');
        const buttonBase = document.getElementById('glowButtonBase');
        const page = document.getElementById('Neroo-page-3');

        // ====== FUNGSI YANG DIPANGGIL ONCLICK (global, karena ada di onclick="setFunction") =====
        window.setFunction = function(element) {
            // toggle class ACC (invert & scale besar)
            element.classList.toggle('ACC');
        };

        // ====== EFEK BORDER GRADIENT MENGIKUTI MOUSE PADA BUTTON =====
        buttonBase.addEventListener('mousemove', function(e) {
            const rect = this.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;
            this.style.setProperty('--x', x + '%');
            this.style.setProperty('--y', y + '%');
        });

        buttonBase.addEventListener('mouseleave', function() {
            // reset ke tengah biar smooth
            this.style.setProperty('--x', '50%');
            this.style.setProperty('--y', '50%');
        });

        // ====== FITUR CRAFT BUTTON: membaca pola cube aktif (yang punya class ACC) =====
        // dan mengubah background sesuai pola tertentu.
        craftBtn.addEventListener('click', function() {
            // Kumpulkan nama-nama cube yang memiliki class "ACC" (aktif / invert)
            const activeCubes = [];
            document.querySelectorAll('.cube').forEach(cube => {
                if (cube.classList.contains('ACC')) {
                    // Ambil data-name atau dari h1 terdekat? lebih simpan data-name di cube
                    let name = cube.getAttribute('data-name');
                    if (!name) {
                        // fallback: ambil teks h1 sibling? (tapi lebih baik pakai data-name)
                        // kita sudah set data-name di html, aman.
                        name = 'unknown';
                    }
                    activeCubes.push(name);
                }
            });

            // Buat pesan / log, dan ganti background berdasarkan pola
            console.log('Active cubes:', activeCubes);

            // Tentukan kombinasi: misal jika user mengklik "quantum" dan "people" (dua kiri atas) maka background merah & putih
            // Bisa banyak variasi. Kita buat beberapa aturan menarik.

            const pattern = activeCubes.sort().join(','); // urutkan biar konsisten

            // Default gradient atau warna
            let gradient = 'radial-gradient(circle at 30% 30%, #ff3366, #3300ff), linear-gradient(145deg, #141a24, #1f2837)';

            if (pattern === 'people,quantum') {
                // Kiri atas quantum + people → background putih & merah (seperti contoh)
                gradient = 'linear-gradient(145deg, #ffdddd, #cc0000)';
            } else if (pattern === 'center') {
                // hanya center aktif → putih metalik
                gradient = 'radial-gradient(circle at 70% 20%, #ffffff, #cccccc, #888888)';
            } else if (pattern === 'mini,xilonen') {
                // kanan atas+bawah? xilonen & mini → biru electric
                gradient = 'linear-gradient(45deg, #00ffff, #0000ff)';
            } else if (pattern === 'people,quantum,center') {
                // tiga kubus: merah, putih, biru
                gradient = 'linear-gradient(90deg, #ff0000, #ffffff, #0000ff)';
            } else if (pattern === 'people,mini,quantum,xilonen' || pattern.includes('people') && pattern.includes('xilonen') && pattern.length > 3) {
                // banyak aktif: gradien pelangi
                gradient = 'linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet)';
            } else if (activeCubes.length >= 4) {
                // 4 atau lebih aktif → semarak
                gradient = 'radial-gradient(circle at 20% 40%, #f0f, #0ff, #f0f)';
            } else if (activeCubes.length === 0) {
                // tidak ada yang aktif → gelap dengan kilau
                gradient = 'radial-gradient(circle at 30% 70%, #232323, #0a0f1a)';
            } else {
                // sisanya, kombinasi random tapi menarik
                gradient = 'linear-gradient(125deg, #3b2b5f, #2b5f4b, #1e3a5f)';
            }

            // Terapkan background ke page dengan efek transisi smooth
            page.style.transition = 'background 0.6s ease';
            page.style.background = gradient;

            // tambah efek kilau tambahan (inline style override background-image, kita set via css)
            // tapi karena background-image sudah di set di css, kita perlu mengganti secara langsung.
            // cara lebih baik: set background-image, dan hilangkan radial gradient overlay? kita override full.
            page.style.backgroundImage = gradient;
            page.style.backgroundSize = 'cover';

            // bonus: sedikit umpan balik pada button
            craftBtn.style.transform = 'scale(0.95)';
            setTimeout(() => craftBtn.style.transform = '', 150);

            // tambahan: jika pola khusus "center" dan "people" muncul, munculkan alert ringan (bisa juga tidak)
            if (pattern === 'center,people') {
                // tidak wajib, tapi biar ada efek tambahan (optional)
                document.querySelector('#line1').style.background = 'white';
                document.querySelector('#line1').style.boxShadow = '0 0 40px red';
                setTimeout(() => {
                    document.querySelector('#line1').style.background = '';
                    document.querySelector('#line1').style.boxShadow = '';
                }, 500);
            }
        });

        // ===== biar ada efek reset jika di klik dua kali (optional) =====
        // namun fungsi sudah diatur toggle.

        // ===== tambahan: update efek data-name untuk setiap cube agar mudah dikenali =====
        // (sudah ditambahkan di html secara manual)
        // Untuk cube center sudah punya class ACC awal, kita sync data-name.
        document.querySelector('#centerCube').setAttribute('data-name', 'center');
        // lainnya sudah.

        // Pastikan semua cube memiliki data-name (pengecekan)
        const nameMap = {
            0: 'quantum',
            1: 'people',
            2: 'center',
            3: 'xilonen',
            4: 'mini'
        };
        cubes.forEach((cube, idx) => {
            if (!cube.getAttribute('data-name')) {
                // fallback sesuai urutan (aman)
                if (idx === 2) cube.setAttribute('data-name', 'center');
                else if (idx === 0) cube.setAttribute('data-name', 'quantum');
                else if (idx === 1) cube.setAttribute('data-name', 'people');
                else if (idx === 3) cube.setAttribute('data-name', 'xilonen');
                else if (idx === 4) cube.setAttribute('data-name', 'mini');
            }
        });

        // Pesan inisialisasi: background default agak gelap dengan kilau (mirip gambar template)
        // sudah di css. kita set sedikit extra
        page.style.background = '#0e1622'; // deep
        page.style.backgroundImage = `radial-gradient(circle at 20% 30%, rgba(200,100,50,0.15) 0%, transparent 40%),
        radial-gradient(circle at 90% 70%, rgba(50,150,200,0.2) 0%, transparent 50%),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 10px),
        linear-gradient(145deg, #1b212e, #101624)`;
    })();
</script>

<!-- Catatan: gambar Cube-icon.png tidak tersedia, tapi menggunakan teks alternatif (img hanya placeholder) 
     namun karena file tidak ada, akan tampil broken. Di sini kita bisa ganti dengan font atau emoji jika ingin.
     Tapi karena di template asli pakai icon, kita biarkan saja sebagai placeholder. Jika ingin lebih mirip,
     kita bisa buat kotak dengan css, namun sesuai deskripsi gambar icon cube. Saya tambahkan style fallback: -->
<style>
    /* fallback jika gambar tidak ada: tampilkan kotak dengan simbol □ */
    img[alt="cube"] {
        content: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120"><rect width="90" height="90" x="5" y="5" fill="%23344a5e" stroke="%238ad0ff" stroke-width="6" rx="15" /><text x="20" y="70" font-size="50" fill="%23d0f0ff" font-weight="bold">□</text></svg>');
    }
    /* supaya tetap terlihat kotak keren, tapi jika gambar asli ada akan tetap diprioritaskan */
    .cube img {
        object-fit: contain;
        border-radius: 12px;
    }
</style>

</body>
</html>
