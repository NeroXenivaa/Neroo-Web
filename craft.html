<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craft · handmade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Georgia', 'Times New Roman', serif;
        }

        body {
            min-height: 100vh;
            background: #e8dccc; /* warna dasar kertas tua */
            background-image: 
                radial-gradient(circle at 30% 40%, rgba(160, 130, 80, 0.08) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(110, 70, 30, 0.06) 0%, transparent 40%),
                repeating-linear-gradient(45deg, rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 2px, transparent 2px, transparent 12px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* halaman utama */
        .craft-page {
            width: 100%;
            max-width: 1200px;
            background: rgba(245, 235, 215, 0.7);
            backdrop-filter: blur(2px);
            border-radius: 80px 80px 40px 40px;
            box-shadow: 0 20px 40px rgba(100, 70, 40, 0.3), inset 0 0 0 1px rgba(255, 255, 240, 0.7);
            padding: 40px 20px 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ===== BUTTON CRAFT dengan efek glow hangat ===== */
        .button-wrap {
            position: relative;
            margin-bottom: 50px;
            border-radius: 100px;
            background: #d6c8b2;
            padding: 5px;
            box-shadow: 0 5px 0 #9b8e78;
        }

        .craft-btn {
            background: #bcae8b;
            border: none;
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 10px;
            padding: 20px 80px;
            border-radius: 100px;
            color: #3f3a2e;
            cursor: pointer;
            position: relative;
            z-index: 2;
            transition: all 0.2s ease;
            box-shadow: inset 0 -4px 0 #7f6e4f, 0 8px 15px rgba(80, 50, 20, 0.2);
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
            border: 2px solid #eadbc1;
        }

        .button-wrap::before {
            content: '';
            position: absolute;
            top: -8px; left: -8px; right: -8px; bottom: -8px;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), #f5e7c8, #c8b088, transparent 80%);
            border-radius: 120px;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.3s;
            mix-blend-mode: soft-light;
            pointer-events: none;
        }

        .button-wrap:hover::before {
            opacity: 0.9;
        }

        .craft-btn:hover {
            background: #d6c29b;
            transform: translateY(-2px);
            box-shadow: inset 0 -4px 0 #9b8a64, 0 12px 20px rgba(120, 70, 20, 0.3);
            color: #2d281c;
        }

        .craft-btn:active {
            transform: translateY(3px);
            box-shadow: inset 0 2px 0 #7f6e4f;
        }

        /* ===== LAYOUT UTAMA (seperti template) ===== */
        .craft-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            background: #e3d5bd;
            padding: 40px 50px;
            border-radius: 70px;
            box-shadow: inset 0 0 0 3px #f2e5ce, 0 15px 20px rgba(80, 60, 30, 0.25);
            border: 2px solid #cbb292;
            position: relative;
        }

        .col {
            display: flex;
            flex-direction: column;
            gap: 70px;
        }

        /* setiap item kubus */
        .craft-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .cube {
            width: 140px;
            height: 140px;
            background: #f1e2cc;
            border: 6px solid #b49a78;
            box-shadow: 8px 8px 0 #7f623d, inset 0 0 0 4px #ead6b5;
            transform: rotate(2deg);
            transition: all 0.25s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px 25px 15px 25px; /* sudut tidak beraturan, kesan handmade */
        }

        /* variasi rotasi tiap cube agar lebih organik */
        .col:first-child .cube {
            transform: rotate(-1deg);
        }
        .col:last-child .cube {
            transform: rotate(3deg);
        }
        .craft-item.center .cube {
            transform: rotate(0deg);
        }

        .cube::after {
            content: "⬚";
            font-size: 80px;
            color: #9c835d;
            opacity: 0.6;
            font-weight: normal;
            transform: scaleX(-1);
        }

        /* saat aktif (invert) — kita buat gaya "terpilih" dengan warna putih/krem terang */
        .cube.active {
            background: #fff8e7;
            border-color: #e6cda5;
            box-shadow: 8px 8px 0 #c9a66b, inset 0 0 0 4px #fef7e6;
            filter: drop-shadow(0 0 12px #f0cf9c);
        }

        .cube.active::after {
            color: #ad8f62;
            opacity: 1;
        }

        .cube:hover {
            transform: scale(1.05) rotate(0deg);
            box-shadow: 10px 10px 0 #9e7e55, inset 0 0 0 4px #ffeac6;
        }

        /* teks di bawah cube */
        .craft-item h2 {
            margin-top: 15px;
            font-size: 26px;
            font-weight: 400;
            letter-spacing: 4px;
            color: #4d3b26;
            background: #dacbb0;
            padding: 4px 20px;
            border-radius: 40px;
            border: 1px solid #b29975;
            box-shadow: inset 0 1px 4px #fff3dd, 0 4px 0 #8d7453;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            font-size: 22px;
        }

        /* garis dekoratif (seperti di template) */
        .grid-line {
            position: absolute;
            bottom: 20px;
            left: 10%;
            width: 80%;
            height: 6px;
            background: #cbb190;
            border-radius: 10px;
            box-shadow: 0 2px 0 #f0dec6, inset 0 2px 4px #8b6f4a;
        }

        /* sentuhan ekstra: cap kertas */
        .craft-page::after {
            content: "✻  craft  ✻";
            position: absolute;
            bottom: 10px;
            right: 40px;
            font-size: 18px;
            color: #aa987c;
            opacity: 0.3;
            font-family: 'Courier New';
        }

        /* responsif */
        @media (max-width: 800px) {
            .craft-grid { gap: 20px; padding: 30px; }
            .cube { width: 110px; height: 110px; }
            .cube::after { font-size: 60px; }
        }
    </style>
</head>
<body>
    <div class="craft-page" id="craftPage">
        <!-- button craft dengan efek glow -->
        <div class="button-wrap" id="glowWrap">
            <button class="craft-btn" id="actionBtn">Craft</button>
        </div>

        <!-- grid utama persis seperti template: kiri, tengah, kanan -->
        <div class="craft-grid" id="mainGrid">
            <!-- kolom kiri (Quantum & People) -->
            <div class="col">
                <div class="craft-item" data-name="quantum">
                    <div class="cube" onclick="toggleCube(this)"></div>
                    <h2>Quantum</h2>
                </div>
                <div class="craft-item" data-name="people">
                    <div class="cube" onclick="toggleCube(this)"></div>
                    <h2>People</h2>
                </div>
            </div>

            <!-- kolom tengah (Center) -->
            <div class="craft-item center" data-name="center">
                <div class="cube active" onclick="toggleCube(this)" id="centerCube"></div>
                <h2>Center</h2>
            </div>

            <!-- kolom kanan (Xilonen & Mini) -->
            <div class="col">
                <div class="craft-item" data-name="xilonen">
                    <div class="cube" onclick="toggleCube(this)"></div>
                    <h2>Xilonen</h2>
                </div>
                <div class="craft-item" data-name="mini">
                    <div class="cube" onclick="toggleCube(this)"></div>
                    <h2>Mini</h2>
                </div>
            </div>

            <!-- garis bawah (line) -->
            <div class="grid-line"></div>
        </div>
    </div>

    <script>
        (function() {
            // 1. Efek border / glow mengikuti cursor pada button
            const wrap = document.getElementById('glowWrap');
            wrap.addEventListener('mousemove', function(e) {
                const rect = this.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                this.style.setProperty('--x', x + '%');
                this.style.setProperty('--y', y + '%');
            });
            wrap.addEventListener('mouseleave', function() {
                this.style.setProperty('--x', '50%');
                this.style.setProperty('--y', '50%');
            });

            // 2. Fungsi toggle class active (menggantikan invert)
            window.toggleCube = function(cubeElement) {
                cubeElement.classList.toggle('active');
            };

            // 3. Ambil semua elemen craft-item dan kubus
            const items = document.querySelectorAll('.craft-item');
            const cubes = document.querySelectorAll('.cube');
            const craftBtn = document.getElementById('actionBtn');
            const page = document.getElementById('craftPage');

            // Pastikan setiap item memiliki data-name (sudah ada di HTML)
            // Tapi kita tambahkan data-name ke cube juga untuk memudahkan
            cubes.forEach((cube, index) => {
                // cari parent .craft-item
                const parent = cube.closest('.craft-item');
                if (parent && parent.dataset.name) {
                    cube.dataset.name = parent.dataset.name;
                }
            });

            // 4. Event craft button: baca pola cube active, ubah background dengan warna-warna hangat
            craftBtn.addEventListener('click', function() {
                // kumpulkan nama dari cube yang memiliki class 'active'
                const activeNames = [];
                document.querySelectorAll('.cube.active').forEach(cube => {
                    // ambil dari parent data-name atau dari cube dataset
                    let name = cube.dataset.name;
                    if (!name) {
                        const parent = cube.closest('.craft-item');
                        name = parent ? parent.dataset.name : 'unknown';
                    }
                    activeNames.push(name);
                });

                console.log('active cubes:', activeNames);

                // Urutkan untuk pola
                const pattern = activeNames.sort().join(',');

                // pilih background berdasarkan pola (warna-warna earthy/craft)
                let bgStyle = '';
                if (pattern === 'people,quantum') {
                    // dua kiri atas → putih & merah (tapi merah earthy)
                    bgStyle = 'linear-gradient(145deg, #f7e2c0, #dbb48b)';
                } else if (pattern === 'center') {
                    bgStyle = 'radial-gradient(circle at 30% 40%, #eddabf, #c6af8b)';
                } else if (pattern === 'mini,xilonen') {
                    bgStyle = 'linear-gradient(45deg, #cdb28c, #a58d67)';
                } else if (pattern === 'people,quantum,center') {
                    bgStyle = 'linear-gradient(90deg, #e5cfaa, #bb9f7a, #9c8462)';
                } else if (activeNames.length >= 4) {
                    bgStyle = 'radial-gradient(circle at 70% 20%, #dac29c, #b3956c)';
                } else if (activeNames.length === 0) {
                    bgStyle = '#e8dccc'; // kembali ke default
                } else {
                    bgStyle = '#dfd0b4'; // warna netral
                }

                // tambahkan tekstur halus
                page.style.background = bgStyle;
                page.style.backgroundImage = ` radial-gradient(circle at 30% 40%, rgba(160, 130, 80, 0.1) 0%, transparent 30%), 
                radial-gradient(circle at 80% 70%, rgba(110, 70, 30, 0.08) 0%, transparent 40%), 
                repeating-linear-gradient(45deg, rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 2px, transparent 2px, transparent 12px)`;

                // efek sementara pada button
                craftBtn.style.transform = 'scale(0.97)';
                setTimeout(() => craftBtn.style.transform = '', 150);
            });

            // biarkan cube center aktif dari awal (sesuai template)
            // tidak perlu perubahan
        })();
    </script>
</body>
</html>
