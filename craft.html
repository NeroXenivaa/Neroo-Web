<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craft · exact template</title>
    <style>
        /* reset total */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #2f4f4f;  /* darkslategrey solid seperti template */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', 'Helvetica', sans-serif;
        }

        /* container utama – 100% mirip gambar */
        .craft-container {
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ===== BUTTON CRAFT ===== */
        .btn-wrapper {
            margin-bottom: 50px;
            border-radius: 40px;
            background: #d3d3d3;    /* abu-abu terang seperti template */
            padding: 6px 6px 10px 6px;
            box-shadow: 0 4px 0 #8f8f8f;
        }

        .craft-btn {
            background: #a8a8a8;     /* abu-abu gelap */
            border: none;
            font-size: 48px;
            font-weight: bold;
            padding: 15px 90px;
            border-radius: 40px;
            color: #2f4f4f;          /* teks darkslategrey */
            cursor: pointer;
            letter-spacing: 12px;
            text-transform: uppercase;
            border: 3px solid #c0c0c0;
            box-shadow: inset 0 -6px 0 #6b6b6b, 0 10px 15px rgba(0,0,0,0.3);
            transition: 0.1s ease;
            font-family: 'Arial Black', sans-serif;
        }

        /* efek glow sederhana tapi elegan (sesuai permintaan: glow + border mengikuti cursor) */
        .btn-wrapper {
            position: relative;
        }

        .btn-wrapper::before {
            content: '';
            position: absolute;
            top: -8px; left: -8px; right: -8px; bottom: -8px;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,200,0.9), rgba(180,180,180,0.4), transparent 70%);
            border-radius: 60px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1;
        }

        .btn-wrapper:hover::before {
            opacity: 1;
        }

        .craft-btn:hover {
            background: #b8b8b8;
            transform: scale(1.01);
            border-color: #e0e0e0;
        }

        .craft-btn:active {
            transform: translateY(3px);
            box-shadow: inset 0 -3px 0 #6b6b6b;
        }

        /* ===== BASE BOX (abu-abu terang) ===== */
        .craft-base {
            background-color: #b0b0b0;    /* abu-abu seperti template */
            padding: 40px 50px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px;
            box-shadow: 0 15px 0 #6b6b6b, inset 0 0 0 2px #d8d8d8;
            border: 3px solid #8a8a8a;
            position: relative;
        }

        /* kolom kiri & kanan (dua item vertikal) */
        .col {
            display: flex;
            flex-direction: column;
            gap: 80px;
        }

        /* tiap item: cube + tulisan */
        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .item h3 {
            font-size: 28px;
            color: white;
            text-shadow: 3px 3px 0 #4a4a4a;
            background: transparent;
            margin-top: 12px;
            letter-spacing: 2px;
            font-weight: 600;
            font-family: 'Arial', sans-serif;
        }

        /* ===== CUBE ===== */
        .cube {
            width: 130px;
            height: 130px;
            background-color: #5f9ea0;   /* cadetblue dasar, nanti ditimpa gambar */
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            cursor: pointer;
            box-shadow: 8px 8px 0 #3b5e5e;
            border: 4px solid #c0c0c0;
            /* biar kotak, gambar akan menutupi */
        }

        /* gambar kubus (saya buat dengan CSS agar 100% mirip icon template) */
        .cube .cube-icon {
            width: 100%;
            height: 100%;
            background-color: #4f7a7a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            color: #d3d3d3;
            text-shadow: 2px 2px 0 #2b4b4b;
        }

        /* menggunakan karakter kubus (□) agar tampak seperti ikon */
        .cube .cube-icon::after {
            content: "□";
            font-weight: 400;
            font-family: 'Arial', sans-serif;
        }

        /* gaya saat di-klik (invert) — aktif */
        .cube.active {
            filter: invert(1) brightness(1.3);
            background-color: black; /* jadi putih karena invert */
            border-color: white;
            box-shadow: 8px 8px 0 #555;
        }

        .cube.active .cube-icon {
            background-color: #333;
            color: white;
            text-shadow: none;
        }

        /* efek hover */
        .cube:hover {
            transform: scale(1.07);
            box-shadow: 10px 10px 0 #2f4f4f;
        }

        /* center cube sudah aktif dari awal (seperti template) */
        .cube.center-active {
            filter: invert(1) brightness(1.3);
            border-color: white;
        }

        /* garis bawah (line) seperti template */
        .base-line {
            position: absolute;
            bottom: 18px;
            left: 10%;
            width: 80%;
            height: 5px;
            background-color: #6b6b6b;
            border-radius: 4px;
            box-shadow: 0 2px 0 #c0c0c0;
        }

        /* ===== tambahan kecil agar super mirip ===== */
        .item.center-item {
            margin: 0 10px;
        }

        /* ukuran responsive */
        @media (max-width: 800px) {
            .craft-base { gap: 20px; padding: 30px; }
            .cube { width: 100px; height: 100px; }
            .item h3 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="craft-container">
        <!-- button craft -->
        <div class="btn-wrapper" id="btnGlow">
            <button class="craft-btn" id="craftButton">CRAFT</button>
        </div>

        <!-- base box utama (abu-abu) -->
        <div class="craft-base" id="mainBase">
            <!-- kolom kiri: quantum & people -->
            <div class="col">
                <div class="item" data-name="quantum">
                    <div class="cube" onclick="toggleActive(this)">
                        <div class="cube-icon"></div>
                    </div>
                    <h3>Quantum</h3>
                </div>
                <div class="item" data-name="people">
                    <div class="cube" onclick="toggleActive(this)">
                        <div class="cube-icon"></div>
                    </div>
                    <h3>People</h3>
                </div>
            </div>

            <!-- tengah: center (dengan class active) -->
            <div class="item center-item" data-name="center">
                <div class="cube center-active" onclick="toggleActive(this)" id="centerCube">
                    <div class="cube-icon"></div>
                </div>
                <h3>Center</h3>
            </div>

            <!-- kolom kanan: xilonen & mini -->
            <div class="col">
                <div class="item" data-name="xilonen">
                    <div class="cube" onclick="toggleActive(this)">
                        <div class="cube-icon"></div>
                    </div>
                    <h3>Xilonen</h3>
                </div>
                <div class="item" data-name="mini">
                    <div class="cube" onclick="toggleActive(this)">
                        <div class="cube-icon"></div>
                    </div>
                    <h3>Mini</h3>
                </div>
            </div>

            <!-- line (garis dekoratif) -->
            <div class="base-line"></div>
        </div>
    </div>

    <script>
        (function() {
            // 1. Efek glow border pada button mengikuti cursor
            const btnWrap = document.getElementById('btnGlow');
            btnWrap.addEventListener('mousemove', function(e) {
                const rect = this.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                this.style.setProperty('--x', x + '%');
                this.style.setProperty('--y', y + '%');
            });
            btnWrap.addEventListener('mouseleave', function() {
                this.style.setProperty('--x', '50%');
                this.style.setProperty('--y', '50%');
            });

            // 2. Fungsi toggle invert / active (global)
            window.toggleActive = function(cubeElement) {
                cubeElement.classList.toggle('active');
                // pastikan center cube juga bisa toggle meskipun awal active
            };

            // 3. Setiap cube diberi data-name berdasarkan parent item
            const items = document.querySelectorAll('.item');
            items.forEach(item => {
                const cube = item.querySelector('.cube');
                if (cube && item.dataset.name) {
                    cube.dataset.name = item.dataset.name;
                }
            });

            // 4. Tombol CRAFT: baca pola cube yang aktif, ubah background
            const craftBtn = document.getElementById('craftButton');
            const page = document.body; // body dengan background darkslategrey

            craftBtn.addEventListener('click', function() {
                // kumpulkan nama dari cube yang punya class 'active'
                const activeCubes = [];
                document.querySelectorAll('.cube.active').forEach(cube => {
                    let name = cube.dataset.name;
                    if (!name) {
                        // fallback dari parent
                        const parent = cube.closest('.item');
                        name = parent ? parent.dataset.name : 'unknown';
                    }
                    activeCubes.push(name);
                });

                console.log('pola aktif:', activeCubes);

                // pola untuk background (tetap dalam warna darkslategrey, hanya sedikit variasi)
                // namun karena template menginginkan 100% mirip, background hanya berubah jika kombinasi spesifik
                // default: darkslategrey solid
                let bgColor = '#2f4f4f';  // darkslategrey

                // pola contoh: jika quantum + people, jadi putih & merah (seperti deskripsi)
                const pattern = activeCubes.sort().join(',');

                if (pattern === 'people,quantum') {
                    bgColor = '#8b3a3a';  // merah gelap (tetap dalam tone gelap)
                } else if (pattern === 'center') {
                    bgColor = '#3b5e5e';  // sedikit lebih terang
                } else if (pattern === 'mini,xilonen') {
                    bgColor = '#4f5f3a';  // olive gelap
                } else if (pattern === 'people,quantum,center') {
                    bgColor = '#6f4f4f';  // merah kecoklatan
                } else if (activeCubes.length >= 4) {
                    bgColor = '#3a5f5f';  // teal gelap
                }

                // ubah background body (hanya warna solid, tanpa gradien, agar 100% seperti template)
                page.style.backgroundColor = bgColor;
                page.style.transition = 'background-color 0.3s';

                // efek klik di button
                craftBtn.style.transform = 'scale(0.95)';
                setTimeout(() => craftBtn.style.transform = '', 120);

                // sedikit interaksi: garis line berubah warna tipis
                const line = document.querySelector('.base-line');
                line.style.backgroundColor = '#c0c0c0';
                setTimeout(() => line.style.backgroundColor = '#6b6b6b', 200);
            });

            // Center cube sudah active dari awal, pastikan class 'active' juga ada agar terbaca
            const center = document.getElementById('centerCube');
            if (center) {
                center.classList.add('active'); // memastikan class active (karena sudah ada center-active)
                // synchronize data-name
                center.dataset.name = 'center';
            }

            // Tambahkan class active ke semua cube yang punya center-active (hanya center)
        })();
    </script>
</body>
</html>
